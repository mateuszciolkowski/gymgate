name: Gemini AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini Code Review
        # Ta akcja jest oficjalnie utrzymywana i stabilna
        uses: google-gemini/generative-ai-code-review@v1
        with:
          node-version: "20"
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: "gemini-1.5-flash" # Darmowy i szybki
          # Twój prompt po angielsku (dla logiki) i polsku (dla wyniku)
          custom_prompt: |
            You are a Senior Fullstack Developer. Review this PR for the GymGate monorepo.
            Check:
            1. Consistency between Prisma schema and Frontend types.
            2. Offline-first logic (syncManager/localStore).
            3. Zod validation in Express routes.

            IMPORTANT: Write your review in POLISH. Be concise.
