name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini AI Review
        uses: sshnaidm/gemini-code-review-action@v2
        with:
          gemini-key: ${{ secrets.GEMINI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          model: "gemini-2.5-flash"
          prompt: |
            Act as a Senior Fullstack Developer. Review this PR for the GymGate monorepo.
            Focus on:
            1. Consistency between Prisma schema and Frontend types.
            2. Offline-first logic (syncManager/localStore).
            3. Zod validation in Express routes.

            IMPORTANT: Provide your review EXCLUSIVELY in POLISH. Be concise.
