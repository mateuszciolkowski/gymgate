name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Gemini AI Review
        uses: sshnaidm/gemini-code-review-action@v2
        with:
          gemini-key: ${{ secrets.GEMINI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          model: "gemini-1.5-flash"
          prompt: |
            You are a Senior Fullstack Developer. Review this PR for the GymGate monorepo.
            Check:
            1. Consistency between Prisma schema (backend/prisma/schema.prisma) and Frontend types.
            2. Offline-first logic (syncManager/localStore) - ensure no logic breaks deferred sync.
            3. Zod validation in Express routes.
            4. General Clean Code and TypeScript best practices.

            IMPORTANT: Provide your review EXCLUSIVELY in POLISH. Be concise and helpful.
