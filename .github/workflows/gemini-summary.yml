name: Gemini Summary

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  gemini-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini AI Summary
        uses: sshnaidm/gemini-code-review-action@v2
        with:
          gemini-key: ${{ secrets.GEMINI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          model: "gemini-2.5-flash"
          prompt: |
            Act as a Senior Fullstack Developer for the GymGate monorepo.
            Prepare a concise CHANGE SUMMARY for this pull request.

            For every important change, explain:
            1. What was changed.
            2. How it was changed.
            3. Why this change was made.
            4. What benefit/result it gives.

            IMPORTANT: Write EXCLUSIVELY in POLISH. Keep it concise and concrete.
